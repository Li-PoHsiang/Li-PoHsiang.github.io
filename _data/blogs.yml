intro:
  title: "Blogs"
  subtitle: "Films, Books, and Notes"
  description: >-
    This page records films, books, and fragments of thought encountered in everyday life.
    It is not a formal review archive, but a personal space for keeping impressions,
    moods, and intellectual traces.

entries:
  - id: movie-in-the-mood-for-love
    type: movie
    title: 花样年华
    title_en: In the Mood for Love
    creator: 王家卫
    year: 2000
    date: 2026-05-05
    rating: 5
    cover: assets/images/blogs/movies/in-the-mood-for-love.png
    tags:
      - 电影
      - 香港
      - 王家卫
      - 情绪
    note: >-
      克制、暧昧与错过构成了影片最深的情绪底色。人物在狭窄楼道、旗袍纹理与昏黄灯光之间反复擦肩，
      使“没有说出口的话”成为整部电影最有重量的部分。
    content: >-
      《花样年华》真正打动我的地方，不只是它的影像美学，而是它将“未完成的关系”
      拍成了一种可以反复回响的情绪。影片中的人物始终保持着克制，很多话没有说出口，
      很多关系没有真正开始，却因此留下了更持久的余韵。楼道、旗袍、昏黄灯光与狭窄空间
      共同构成了一种压抑而精致的情绪场，使观众不断感受到靠近与错过之间的距离。

