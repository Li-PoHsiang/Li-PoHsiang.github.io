  - id: book-the-little-prince
    type: book
    title: 小王子
    title_en: The Little Prince
    creator: Antoine de Saint-Exupéry
    year: 1943
    date: 2026-05-05
    rating: 5
    cover: ""
    tags:
      - 图书
      - 文学
      - 童话
      - 人生
    note: >-
      这本书用极其简洁的童话形式讨论孤独、爱、责任与观看世界的方式。它真正打动人的地方，
      不在于故事复杂，而在于把成年人遗忘的敏感与纯粹重新带回眼前。
