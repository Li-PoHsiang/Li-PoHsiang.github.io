  - id: book-sapiens
    type: book
    title: 人类简史
    title_en: Sapiens
    creator: Yuval Noah Harari
    year: 2011
    date: 2026-05-05
    rating: 4
    cover: ""
    tags:
      - 图书
      - 历史
      - 社会
      - 文明
    note: >-
      这本书提供了一种宏观理解人类社会演化的视角，将认知革命、农业革命和科学革命联系起来。
      它的价值不只在于知识点本身，也在于帮助读者重新思考制度、信念与集体想象如何塑造世界。
