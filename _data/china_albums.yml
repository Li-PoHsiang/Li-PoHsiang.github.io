intro:
  title: China
  subtitle: Mountains, Rivers, Cities, and Cultural Landscapes
  description: 中国幅员辽阔，山河壮丽，既有江河湖海、雪域高原、林海草原，也有历史城市、边疆风貌与多元文化景观。这个页面不是旅行记录，而是一个持续生长的中国影像相册，用来收藏与呈现中国大好河山及各地风物。尚未放入图片的省级相册会显示为“等待探索”。
albums:
- slug: beijing
  display_name: 北京市
  display_en: Beijing
  type: 直辖市
  region: 华北
  cover: assets/images/china/beijing/gugong.jpg
  status: explored
  intro: 北京是中国首都，也是历史文化与现代城市景观高度交织的中心城市。这里既有故宫、天坛、长城、颐和园等承载古都文脉的历史遗存，也有中轴线、胡同街巷、现代建筑与城市公共空间共同构成的时代风貌，展现出厚重、庄严而开放的都城气质。
  photos: 
  - file: assets/images/china/beijing/gugong.jpg
    title: 故宫
    place: 北京
    description: 故宫位于北京中轴线核心位置，是中国古代宫城建筑的代表。红墙、黄瓦、宫门与层层院落共同构成了庄严而恢宏的空间秩序，既展现出明清皇家建筑的制度气象，也承载着中国古都文明中深厚的历史记忆。
  - file: assets/images/china/beijing/tiananmen.jpg
    title: 天安门
    place: 北京
    description: 天安门坐落于北京城市中轴线上，是中国近现代国家记忆与首都形象的重要地标。城楼庄重开阔，红墙金瓦与广场空间相互映衬，形成了具有仪式感和历史厚度的城市景观，也展现出北京作为国家中心的庄严气质。
