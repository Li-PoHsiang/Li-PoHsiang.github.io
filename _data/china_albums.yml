- slug: yunnan
  display_name: 云南省
  display_en: Yunnan
  type: 省
  region: 西南
  cover: assets/images/china/yunnan/erhai.jpg
  status: explored
  intro: 云南地处中国西南边陲，山川纵横、湖泊清澈、气候多样。这里既有高原湖泊的开阔宁静，也有雪山峡谷的壮丽层次，自然景观与民族文化共同构成了独特而丰富的西南山河图景。
  photos:
  - file: assets/images/china/yunnan/erhai.jpg
    title: 洱海
    place: 丽江
    description: 苍山为伴，碧空如洗，一叶绿舟静静停泊在波光粼粼的洱海之上，远眺着对岸的白墙黛瓦与连绵群山，尽显岁月静好。
  - file: assets/images/china/yunnan/lanyuegu.jpg
    title: 蓝月谷
    place: 丽江
    description: 背景里黄绿相间的秋季森林，以及半山腰弥漫的云雾，完美展现了雪山脚下冷杉和阔叶林交织的高山峡谷风貌。
  - file: assets/images/china/yunnan/pobu.jpg
    title: 蓝月谷瀑布群
    place: 丽江
    description: 清澈纯净的雪山融水顺着层层叠叠的岩石奔流而下，形成了一道宽阔而秀丽的水帘瀑布。
