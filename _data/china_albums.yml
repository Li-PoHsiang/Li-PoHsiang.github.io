- slug: henan
  display_name: 河南省
  display_en: Henan
  type: 省
  region: 华中
  cover: assets/images/china/henan/dasongxilou.jpg
  status: explored
  intro: 河南地处中原腹地，是中华文明的重要发源地之一。黄河流域、嵩山山脉、洛阳古都、开封城韵与广阔平原共同构成了厚重而开阔的中原图景，展现出历史文脉、山河形胜与农耕文明交织而成的地域气质。
  photos: 
  - file: assets/images/china/henan/dasongxilou.jpg
    title: 大宋戏楼
    place: 开封
    description: 夜幕降临，开封的大宋戏楼金碧辉煌，楼前广场人山人海的夜市繁华，尽显这座千年古都生生不息的烟火气与盛世神韵。
- slug: hubei
  display_name: 湖北省
  display_en: Hubei
  type: 省
  region: 华中
  cover: assets/images/china/hubei/lihuang.jpg
  status: explored
  intro: 湖北地处长江中游，江河湖泊纵横，山地、平原与城市景观相互交织。这里既有武汉江城风貌与长江气象，也有武当山、神农架、东湖等自然与人文景观，呈现出荆楚大地兼具开阔水韵与历史厚度的山河格局。
  photos: 
  - file: assets/images/china/hubei/lihuang.jpg
    title: 黎黄陂路
    place: 武汉
    description: 黎黄陂路保留着武汉近代街区的历史肌理，老建筑、梧桐树影与街巷生活交织在一起，呈现出江城独有的文艺气息与城市记忆。
- slug: hunan
  display_name: 湖南省
  display_en: Hunan
  type: 省
  region: 华中
  cover: assets/images/china/hunan/juzizhou.jpg
  status: explored
  intro: 湖南地处中国中南部，湘江贯穿南北，山水、湖泊与丘陵共同塑造出丰富的地域景观。这里既有张家界的奇峰异石、洞庭湖的开阔水色，也有长沙街巷的烟火气与湘西文化的神秘色彩，展现出湖湘大地雄奇、热烈而富有生命力的山河气象。
  photos: 
  - file: assets/images/china/hunan/juzizhou.jpg
    title: 橘子洲头
    place: 长沙
    description: 橘子洲头静卧湘江之中，江水两岸铺展出长沙的城市轮廓与湖湘山水的开阔气象。洲上绿意、江面风光与历史文化记忆相互交织，使这里成为凝望长沙、理解湖湘精神的一处重要空间。
  - file: assets/images/china/hunan/qishierqilou.jpg
    title: 七十二奇楼
    place: 张家界
    description: 璀璨的灯火勾勒出层层叠叠、高耸入云的土家族吊脚楼群，中央巨大的镂空门洞宛如一扇开启异次元的奇幻之门，将神秘的湘西底蕴与赛博朋克般的宏大夜景完美交织。
  - file: assets/images/china/hunan/pozijie.jpg
    title: 坡子街
    place: 长沙
    description: 密密麻麻的霓虹灯牌将繁华的夜空彻底点燃，街头巷尾弥漫着臭豆腐与热辣烧烤的诱人香气，伴随着熙熙攘攘的人潮，沸腾出星城长沙最火热、最鲜活的市井狂欢。
- slug: guangdong
  display_name: 广东省
  display_en: Guangdong
  type: 省
  region: 华南
  cover: assets/images/china/guangdong/jiaotang.jpg
  status: explored
  intro: 广东地处中国南部沿海，山海相连、江河入海、城市繁盛，是岭南文化与现代都市景观交织最为鲜明的地区之一。这里既有广州、深圳等开放活跃的城市空间，也有骑楼街巷、近代建筑、珠江水系与高校文脉共同构成的南方地域气质。
  photos: 
  - file: assets/images/china/guangdong/jiaotang.jpg
    title: 石室圣心大教堂
    place: 广州
    description: 石室圣心大教堂是广州具有代表性的历史建筑之一，哥特式尖拱、玫瑰花窗与石砌立面共同营造出庄重而典雅的空间气质。它静立于城市街区之中，将岭南都市风貌、近代建筑记忆与宗教文化景观交织在一起。
  - file: assets/images/china/guangdong/guangzhouta.jpg
    title: 广州塔
    place: 广州
    description: 广州塔矗立于珠江之畔，是广州现代城市天际线中最具辨识度的地标之一。修长而流动的塔身与珠江新城高楼群相互映衬，展现出岭南都市开放、轻盈而富有活力的现代气质，也连接着广州传统水岸与当代城市发展的空间想象。
  - file: assets/images/china/guangdong/zhongshandaxue.jpg
    title: 中山大学
    place: 广州
    description: 中山大学承载着广州深厚的教育文脉与校园记忆。红砖建筑、林荫道路与岭南校园空间相互交织，形成一种沉静而厚重的学术氛围。这里既保留着近代高等教育的发展痕迹，也展现出南方大学开放、包容与求知的精神气质。
- slug: guangxi
  display_name: 广西壮族自治区
  display_en: Guangxi
  type: 自治区
  region: 华南
