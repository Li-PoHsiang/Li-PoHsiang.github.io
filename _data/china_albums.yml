- slug: shanghai
  display_name: 上海市
  display_en: Shanghai
  type: 直辖市
  region: 华东
  cover: assets/images/china/shanghai/dongfangmingzhu.jpg
  status: explored
  intro: 上海地处长江入海口，是中国重要的国际化大都市。这里既有外滩、石库门与近代城市记忆，也有陆家嘴天际线、黄浦江两岸和现代公共空间共同构成的都市景观，展现出海派文化、开放气质与现代城市活力交织而成的独特风貌。
  photos: 
  - file: assets/images/china/shanghai/dongfangmingzhu.jpg
    title: 东方明珠
    place: 上海
    description: 东方明珠矗立于黄浦江畔，是上海现代城市天际线中极具辨识度的地标。塔身与陆家嘴高楼群相互映衬，连接着浦江两岸的城市视野，也象征着上海从近代港口城市走向现代国际都市的开放姿态与时代活力。
- slug: jiangsu
  display_name: 江苏省
  display_en: Jiangsu
  type: 省
  region: 华东
  cover: assets/images/china/jiangsu/yangshan.jpg
  status: explored
  intro: 江苏地处中国东部沿海与长江下游地区，江河湖泊、城市园林与历史文脉交织成独特的江南图景。这里既有南京等古都城市的历史厚度，也有水乡、丘陵、园林与现代城市共同构成的多层次地域景观。
  photos:
  - file: assets/images/china/jiangsu/yangshan.jpg
    title: 羊山公园
    place: 南京
    description: 羊山公园位于南京城北，以开阔的山体景观、草木绿意与城市休闲空间相互交织为特色。山坡、步道与林木共同营造出舒展而宁静的自然氛围，使其成为城市之中感受地形起伏、绿色空间与日常生活节奏的地方。
  - file: assets/images/china/jiangsu/shuihu.jpg
    title: 水浒英雄城
    place: 无锡
    description: 台楼阁、古街市井与梁山人物意象交织在一起，呈现出一种兼具江南水乡气息与古典侠义想象的空间氛围。
- slug: zhejiang
  display_name: 浙江省
  display_en: Zhejiang
  type: 省
  region: 华东
  cover: assets/images/china/zhejiang/xiaocunzhuang.jpg
  status: explored
  intro: 浙江地处中国东南沿海，山水、人文与江南城镇景观相互交织。这里既有丘陵水乡、古村老街与青墙黛瓦，也有深厚的宋韵文化和细腻的地方生活气息，展现出江南山河的温润、雅致与绵长。
  photos: 
  - file: assets/images/china/zhejiang/xiaocunzhuang.jpg
    title: 廿四都
    place: 江山
    description: 廿四都保留着江南古村的温润气质。青墙黛瓦、老街巷道与地方烟火气交织在一起，仿佛让千年宋韵仍在日常生活中缓缓流动。糖糕甜香、炊烟与村落肌理共同构成了一幅安静而亲切的江南生活画面。
  - file: assets/images/china/zhejiang/yaolin.jpg
    title: 地下溶洞
    place: 桐庐
    description: 在幽深的地下溶洞中，五彩斑斓的人工灯光将无数奇形怪状的钟乳石和石笋点亮，营造出一个梦幻、神秘而又宏大的“瑶琳仙境”，仿佛置身于一座地下的光影迷宫。
  - file: assets/images/china/zhejiang/meihuazhou.jpg
    title: 梅花洲
    place: 嘉兴
    description: 梅花洲呈现出典型江南园林与古镇水乡交织的清雅气质。白墙黑瓦的建筑掩映于繁茂绿树之间，石拱门在枝叶间若隐若现，使空间显得幽静而含蓄。这里既有江南建筑的古朴韵味，也保留着远离喧嚣的园林意境。
  - file: assets/images/china/zhejiang/tongjunshan.jpg
    title: 桐君山
    place: 桐庐
    description: 郁郁葱葱的绿树如重重巨伞，将一座幽静的白墙黑瓦建筑半掩在土坡之上，其古朴的石拱门在繁茂的枝叶间若隐若现，尽显江南园林离尘脱俗的静谧之美。
  - file: assets/images/china/zhejiang/xihu.jpg
    title: 西湖
    place: 杭州
    description: 在淡灰色、微朦的天空下，开阔的西湖湖面上，多艘带蓬的摇橹船载着游客缓缓穿梭，远处的连绵群山在薄雾中形成淡淡的剪影，前景的岸边石柱与铁链共同勾勒出一幅经典的江南水乡画卷。
- slug: anhui
  display_name: 安徽省
  display_en: Anhui
  type: 省
  region: 华东
  cover: assets/images/china/anhui/langyage.jpg
  status: explored
  intro: 安徽地处中国华东腹地，山水、人文与历史遗存交相辉映。这里既有江淮平原的开阔，也有皖南山水的清秀与徽派文化的深厚积淀，展现出兼具自然景观、历史文脉与地域风貌的山河气质。
  photos: 
  - file: assets/images/china/anhui/langyage.jpg
    title: 琅琊阁
    place: 滁州
    description: 飞檐凌空的琅琊阁巍然傲立于碧空之下，古朴苍劲的木楼与厚重的青石基座交相辉映，仿佛在静默中俯瞰着世间翻滚的千古风云。
- slug: fujian
  display_name: 福建省
  display_en: Fujian
  type: 省
  region: 华东
  cover: assets/images/china/fujian/luojiasi.jpg
  status: explored
  intro: 福建地处中国东南沿海，山海相依、港湾纵横，自然景观与海洋文化、宗教建筑和地方民俗相互交织。这里既有面向大海的开阔气象，也有古寺、山林与城市烟火共同构成的闽地文化景观。
  photos: 
  - file: assets/images/china/fujian/luojiasi.jpg
    title: 洛伽寺
    place: 泉州
    description: 女子手持长竿站在海边沙滩悠闲垂钓，远景中，一座古老的寺庙建筑群矗立在波光粼粼的海中，背景是云纹独特、蓝天白云的天空。
  - file: assets/images/china/fujian/nanshaolin.jpg
    title: 南少林
    place: 泉州
    description: “少林禅寺”的匾额在古树繁荫掩映下的红瓦古寺上巍然挺立，石阶前的香炉青烟袅袅，尽显禅意静谧。
- slug: jiangxi
  display_name: 江西省
  display_en: Jiangxi
  type: 省
  region: 华东
  cover: assets/images/china/jiangxi/liushiyan.jpg
  status: explored
  intro: 江西地处中国东南腹地，山水形胜与人文积淀相互交织。这里既有丹霞崖壁、群山溪谷等自然景观，也有古村老街、青墙黛瓦与地方生活共同构成的江南文化气息，展现出赣地山河的清秀、厚重与悠长。
  photos: 
  - file: assets/images/china/jiangxi/liushiyan.jpg
    title: 六石岩
    place: 广丰
    description: 赤壁丹崖如擎天巨柱般拔地而起，千仞绝壁上斧劈刀削般的岁月刻痕，在莽莽苍翠中尽显孤傲绝尘的雄奇。
  - file: assets/images/china/jiangxi/jingdezhen.jpg
    title: 御窑博物馆
    place: 景德镇
    description: 御窑博物馆以窑炉般的拱形空间回应景德镇千年陶瓷文脉，红砖肌理与光影层次交织出厚重而现代的建筑气质。它既承载着官窑遗址的历史记忆，也以当代设计语言展现出瓷都文化的延续与新生。
  - file: assets/images/china/jiangxi/tengwangge.jpg
    title: 滕王阁
    place: 南昌
    description: 滕王阁临江而立，层楼飞檐、气势恢宏，是南昌城市景观与赣江文化记忆的重要象征。楼阁建筑的庄重形制与江水、天光相互映照，使这里既有历史名楼的典雅气象，也延续着“落霞与孤鹜齐飞”的诗意想象。
  - file: assets/images/china/jiangxi/shuangxikou.jpg
    title: 双溪口
    place: 广丰
    description: 枯树虬枝斜指微凉的苍穹，远山黛色间升腾起袅袅轻烟，半掩着山坡上的红瓦农舍，将赣东山野的清冷寂寥与微温的烟火气氤氲得恰到好处。
