- slug: shaanxi
  display_name: 陕西省
  display_en: Shaanxi
  type: 省
  region: 西北
  cover: assets/images/china/shaanxi/guchengqiang.jpg
  status: explored
  intro: 陕西地处中国西北与中原腹地的交汇处，是中华文明和古代都城文化的重要承载地。这里既有秦岭山脉、黄土高原等壮阔自然景观，也有西安古城、秦始皇陵兵马俑、大雁塔等历史遗存，展现出厚重、雄浑而深远的关中文脉与山河气象。
  photos: 
  - file: assets/images/china/shaanxi/bingmayong.jpg
    title: 兵马俑
    place: 西安
    description: 整齐列阵的陶俑仿佛仍在守望两千年前的帝国秩序。它以宏大的规模、细致的人物形态与肃穆的地下军阵，展现出秦汉文明的雄浑气象，也凝聚着关中大地深厚的历史记忆。
  - file: assets/images/china/shaanxi/guchengqiang.jpg
    title: 古城墙
    place: 西安
    description: 巍峨的青砖古城楼在繁茂的绿荫掩映下静立于碧空之中，一汪清幽的护城河水沿城蜿蜒流淌，将古都长安的千年厚重与勃勃生机温柔交织。
