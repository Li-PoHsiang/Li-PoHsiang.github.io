  intro: 山海之间的城市空间，兼具历史建筑、港湾景观与街巷生活。
  photos:
  - file: assets/images/china/hongkong/Youmadi.jpg
    title: 油麻地警署
    place: 香港
    description: 油麻地警署保留了香港旧城区的历史肌理。建筑立面、街巷尺度与城市生活相互交叠，呈现出香港独特的城市记忆。
  - file: assets/images/china/hongkong/Taipingshan.jpg
    title: 香港太平山
    place: 香港
    description: 太平山俯瞰维多利亚港与城市天际线，山、海、港湾与高楼共同形成香港最具层次感的空间景观。
  - file: assets/images/china/hongkong/Miaojie.jpg
    title: 香港庙街
    place: 香港
    description: 庙街浓缩了香港街市、招牌、灯光与日常生活的地方气息，是城市烟火与社区记忆的集中呈现。
- slug: macao
  display_name: 澳门特别行政区
  display_en: Macao
  type: 特别行政区
  region: 港澳台
  cover: assets/images/china/macao/xinpujing.jpg
  status: explored
  intro: 澳门位于中国南部珠江口西岸，是一座融合中西文化、海港记忆与现代休闲城市景观的特别行政区。历史街区、葡式建筑、滨海空间与璀璨夜景共同构成了澳门多元而富有层次的城市气质，也展现出其在传统与现代之间交织生成的独特风貌。
  photos: 
  - file: assets/images/china/macao/meigaomei.jpg
    title: 澳门美高梅
    place: 澳门
    description: 伴随着那声经典的狮吼，美高梅为世界留下了无数永恒的光影传奇。
  - file: assets/images/china/macao/weinisiren.jpg
    title: 澳门威尼斯人
    place: 澳门
    description: 湛蓝的运河水倒映着两岸意式风情的暖黄建筑，逼真的穹顶天幕与精致的石拱桥交相辉映，在室内空间里完美复刻了一场永不落幕的威尼斯水乡旧梦。
  - file: assets/images/china/macao/xinpujing.jpg
    title: 澳门新葡京
    place: 澳门
    description: 绚烂的晚霞如同温柔的滤镜铺满天空，金碧辉煌的新葡京宛如一朵盛开的巨型金莲般傲立于跨海大桥尽头，将这座东方赌城的奢华底色与魔幻气息展现得淋漓尽致。